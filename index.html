    <style>
        /* Login Page Styles */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-box {
            background: rgba(45, 43, 85, 0.95);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(108, 99, 255, 0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #6C63FF;
            font-size: 2.2rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .login-header p {
            color: #8A8DB3;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #F7F7FF;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #6C63FF;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6C63FF, #36D1DC);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(108, 99, 255, 0.3);
        }

        .login-note {
            text-align: center;
            color: #8A8DB3;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

                    <label for="username">Full Name</label>
                    <input type="text" id="username" name="username" placeholder="Enter your name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                
                <button type="submit" class="login-btn">Enter Gallery</button>
                <p class="login-note">No password required. Just enter your details to continue.</p>
            </form>
        </div>
    </div>

    <!-- Gallery Page (Hidden Initially) -->
    <div id="galleryPage" class="hidden">
        <!-- Your original gallery content will be loaded here -->
    </div>

        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const loginPage = document.getElementById('loginPage');
            const galleryPage = document.getElementById('galleryPage');
            
            // Check if already logged in
            if (localStorage.getItem('cssGalleryUser')) {
                showGallery();
            }
            
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value;
                const email = document.getElementById('email').value;
                
                if (username && email) {
                    // Save user info
                    localStorage.setItem('cssGalleryUser', JSON.stringify({
                        name: username,
                        email: email,
                        loginTime: new Date().toISOString()
                    }));
                    
                    showGallery();
                }
            });
            
            function showGallery() {
                loginPage.classList.add('hidden');
                galleryPage.classList.remove('hidden');

            function loadGalleryFunctionality() {
                // Your original JavaScript functionality
                const filterButtons = document.querySelectorAll('.filter-btn');
                const artworks = document.querySelectorAll('.artwork');
                const viewCodeButtons = document.querySelectorAll('.view-code');
                const copyButtons = document.querySelectorAll('.copy-btn');
                
                // Filter functionality
                filterButtons.forEach(button => {
                    button.addEventListener('click', function() {
                        filterButtons.forEach(btn => btn.classList.remove('active'));
                        this.classList.add('active');
                        
                        const filterValue = this.getAttribute('data-filter');
                        
                        artworks.forEach(artwork => {
                            if (filterValue === 'all' || artwork.getAttribute('data-category').includes(filterValue)) {
                                artwork.style.display = 'block';
                                setTimeout(() => {
                                    artwork.style.opacity = '1';
                                    artwork.style.transform = 'translateY(0)';
                                }, 10);
                            } else {
                                artwork.style.opacity = '0';
                                artwork.style.transform = 'translateY(20px)';
                                setTimeout(() => {
                                    artwork.style.display = 'none';
                                }, 300);
                            }
                        });
                    });
                });
                
                // View code functionality
                viewCodeButtons.forEach(button => {
                    button.addEventListener('click', function() {
                        const codeDisplay = this.nextElementSibling;
                        const isVisible = codeDisplay.style.display === 'block';
                        
                        document.querySelectorAll('.code-display').forEach(display => {
                            display.style.display = 'none';
                        });
                        
                        document.querySelectorAll('.view-code').forEach(btn => {
                            btn.textContent = 'View Code';
                        });
                        
                        if (!isVisible) {
                            codeDisplay.style.display = 'block';
                            this.textContent = 'Hide Code';
                        }
                    });
                });
                
                // Copy code functionality
                copyButtons.forEach(button => {
                    button.addEventListener('click', function() {
                        const codeContent = this.parentElement.nextElementSibling.textContent;
                        navigator.clipboard.writeText(codeContent).then(() => {
                            const originalText = this.textContent;
                            this.textContent = 'Copied!';
                            setTimeout(() => {
                                this.textContent = originalText;
                            }, 2000);
                            
                        });
                    });
                });
            }
        });
    </script>
